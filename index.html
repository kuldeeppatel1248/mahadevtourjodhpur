<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mahadev Tour Jodhpur | Luxury Rajasthan Travels</title>
    <meta name="description" content="Travel With Trust | Travel With Mahadev. Premium tour packages and luxury transport service in Jodhpur, Rajasthan." />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700;800;900&display=swap');
      
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px; /* Offset for fixed navbar */
        background-color: #0B0B0B;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: #0B0B0B; /* Deep luxury black */
        color: #FFFFFF;
        overflow-x: hidden;
      }
      
      h1, h2, h3, h4, .font-display {
        font-family: 'Cinzel', serif;
      }

      /* Hide scrollbar for clean aesthetic */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Gold gradient border styling */
      .gold-gradient-border {
        border-image: linear-gradient(to right, #D4AF37, #AA7C11, #F3E5AB, #D4AF37) 1;
      }

      /* Glassmorphism details */
      .glass-card {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(212, 175, 55, 0.15);
      }
      
      .glass-card:hover {
        border: 1px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.15);
      }

      /* Text highlight in gold */
      .text-gold {
        color: #D4AF37;
        background: linear-gradient(to right, #F3E5AB 0%, #D4AF37 50%, #AA7C11 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @keyframes gold-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .shimmer-gold {
        background: linear-gradient(120deg, rgba(212, 175, 55, 0) 30%, rgba(212, 175, 55, 0.4) 40%, rgba(212, 175, 55, 0.7) 50%, rgba(212, 175, 55, 0.4) 60%, rgba(212, 175, 55, 0) 70%);
        background-size: 200% 100%;
        animation: gold-shimmer 6s infinite linear;
      }
    </style>
